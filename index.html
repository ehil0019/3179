<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>


</head>

<body>
  <h1>1. Context</h1>
  <div id="dot-map"></div>

  <script>
  vegaEmbed('#dot-map', 'charts/health_map.json');
</script>

  <div id="choropleth-map"></div>
  <script>
    vegaEmbed('#choropleth-map', 'charts/choropleth_map_RA.json');
  </script>

  <div id="state"></div>

  <script>
    vegaEmbed('#state', 'charts/ste_map.json');
  </script>
  

  <h2>Distribution of Health Services in Australia</h2>
  <div id="hexbin"></div>

  <script>
    vegaEmbed('#hexbin', 'charts/hexbin_map.json');
</script>

  <h3>Hospitalisations per 1,000 People (2013–2024)</h3>
  <div id="hospitalisations"></div>

<script>
  vegaEmbed('#hospitalisations', 'charts/Hospitalisations_by_RA.json');
</script>

<h2>Services by State</h2>
<div id="services-state"></div>

<script>
  vegaEmbed('#services-state', 'charts/services_by_state.json');
</script>

  
</body>
</html>
