<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>


</head>

<body>
  <h1>1. Context</h1>
  <div id="dotmap"></div>

  <script>
  vegaEmbed('#dotmap', 'charts/health_map.json');
</script>
  
    
<div id="age-pyramids"></div>

<script>
  vegaEmbed('#age-pyramids', 'charts/population_pyramids.json');
</script>

  <div id="services-dotplot"></div>

<script>
  vegaEmbed('#services-dotplot', 'charts/services_per_capita_dotplot.json');
</script>

  <h2>Distribution of Health Services in Australia</h2>
  <div id="ra-pop-map"></div>

<script>
  vegaEmbed('#ra-pop-map', 'charts/choropleth_map_RA.json');
</script>
  

  <h3>Hospitalisations per 1,000 People (2013–2024)</h3>
  <div id="hospitalisations"></div>

<script>
  vegaEmbed('#hospitalisations', 'charts/Hospitalisations_by_RA.json');
</script>

<h2>Services by State</h2>
<div id="services-state"></div>

<script>
  vegaEmbed('#services-state', 'charts/services_by_state.json');
</script>

<div id="bubble-plot"></div>

  <script>
  vegaEmbed('#bubble-plot', 'charts/bubble_plot.json');
</script>

<div id="heatmap"></div>div>

  <script>
    vegaEmbed('#heatmap', 'charts/heatmap.json');
  </script>

<div id="proportional-map"></div>

  <script>
    vegaEmbed('#proportional-map', 'charts/proportional_symbol.json');
  </script>

  
</body>
</html>
