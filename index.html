<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
  .two-column {
    display: flex;
    gap: 20px;
  }

  .two-column > div {
    flex: 1;
  }
</style>

</head>

<body>
  <h1>1. Context</h1>
  <div class="two-column">
  <div id="map-left"></div>
  <div id="map-right"></div>
</div>
  <div id="hexbin"></div>

  <script>
  vegaEmbed('#map-left', 'charts/health_map.json');
  vegaEmbed('#map-right', 'charts/ste_map.json');
  vegaEmbed('#hexbin', 'charts/hexbin_map.json');
</script>
  
</body>
</html>
